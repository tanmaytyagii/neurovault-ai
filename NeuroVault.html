
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NeuroVault AI — Knowledge Retrieval</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --bg-panel: #12121a;
    --bg-card: #1a1a26;
    --bg-input: #0f0f18;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(99,102,241,0.6);
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.25);
    --accent-2: #a78bfa;
    --text-primary: #f0f0f8;
    --text-secondary: #8888a8;
    --text-muted: #44445a;
    --success: #34d399;
    --error: #f87171;
    --radius: 14px;
    --radius-sm: 8px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="light"] {
    --bg: #f4f4fa;
    --bg-panel: #ffffff;
    --bg-card: #f9f9fd;
    --bg-input: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-focus: rgba(99,102,241,0.5);
    --text-primary: #12121a;
    --text-secondary: #5555700;
    --text-muted: #aaaacc;
    --accent-glow: rgba(99,102,241,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Grid noise bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(99,102,241,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(167,139,250,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 60px;
    background: rgba(10,10,15,0.75);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
  }
  [data-theme="light"] nav { background: rgba(244,244,250,0.8); }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    text-decoration: none;
  }
  .logo-mark {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .logo-mark::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 4px;
    clip-path: polygon(0 0, 70% 0, 100% 30%, 100% 100%, 0 100%);
  }
  .nav-actions { display: flex; align-items: center; gap: 10px; }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent-glow);
    color: var(--accent-2);
    border: 1px solid rgba(99,102,241,0.2);
    letter-spacing: 0.04em;
  }
  .btn-icon {
    width: 34px; height: 34px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    font-size: 15px;
  }
  .btn-icon:hover { background: var(--bg-card); color: var(--text-primary); border-color: rgba(255,255,255,0.15); }

  /* ── LAYOUT ── */
  .app-shell {
    flex: 1;
    display: flex;
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: 2rem 1.5rem 4rem;
    gap: 2rem;
  }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-top: 4px;
  }
  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 8px;
    margin: 12px 0 4px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-secondary);
    transition: var(--transition);
    border: 1px solid transparent;
    text-decoration: none;
  }
  .sidebar-item:hover { background: var(--bg-card); color: var(--text-primary); }
  .sidebar-item.active { background: var(--accent-glow); color: var(--accent-2); border-color: rgba(99,102,241,0.2); }
  .sidebar-icon { font-size: 14px; width: 18px; text-align: center; }

  /* ── MAIN ── */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1.5rem; }

  /* Header */
  .page-header { margin-bottom: 0.5rem; }
  .page-title {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .page-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 300;
  }

  /* ── INPUT PANEL ── */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: var(--transition);
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex; align-items: center; gap: 7px;
  }
  .panel-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  .char-count { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

  textarea, input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    padding: 16px 18px;
  }
  textarea::placeholder, input[type="text"]::placeholder { color: var(--text-muted); }
  #ctx-input { min-height: 180px; max-height: 380px; overflow-y: auto; }

  .question-row {
    display: flex;
    align-items: center;
    gap: 0;
    border-top: 1px solid var(--border);
  }
  .q-prefix {
    padding: 0 14px 0 18px;
    font-size: 13px;
    color: var(--text-muted);
    font-family: var(--font-display);
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  #q-input { padding-left: 0; font-size: 15px; }

  .actions-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
  }
  .actions-left { display: flex; gap: 8px; align-items: center; }
  .chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
    background: transparent;
    font-family: var(--font-body);
  }
  .chip:hover { border-color: rgba(99,102,241,0.4); color: var(--accent-2); background: var(--accent-glow); }

  .btn-submit {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }
  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-submit svg { width: 15px; height: 15px; }

  /* ── SPINNER ── */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSE AREA ── */
  .response-panel { display: none; animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .response-panel.visible { display: block; }

  .response-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .ai-badge {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-2);
  }
  .ai-icon {
    width: 24px; height: 24px;
    background: var(--accent-glow);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .response-meta { font-size: 11px; color: var(--text-muted); }

  .response-body { padding: 20px 18px; }
  .skeleton {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 20px 18px;
  }
  .skeleton.active { display: flex; }
  .skel-line {
    height: 14px;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-panel) 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .response-text {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .response-text strong { color: var(--accent-2); font-weight: 500; }

  .response-actions {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
  }
  .btn-ghost {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
    border: 1px solid var(--border);
    background: transparent;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: var(--transition);
    font-family: var(--font-body);
  }
  .btn-ghost:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.15); background: var(--bg-card); }

  /* ── ERROR ── */
  .error-box {
    display: none;
    padding: 14px 18px;
    margin: 12px 18px;
    border-radius: var(--radius-sm);
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--error);
    font-size: 13px;
    gap: 8px;
    align-items: flex-start;
  }
  .error-box.visible { display: flex; }

  /* ── HISTORY ── */
  .history-section { margin-top: 0.5rem; }
  .history-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .history-item:hover { border-color: rgba(99,102,241,0.3); background: var(--bg-card); }
  .history-q {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-time { font-size: 11px; color: var(--text-muted); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 1px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--border);
  }
  .stat-cell {
    flex: 1;
    background: var(--bg-panel);
    padding: 12px 16px;
    text-align: center;
  }
  .stat-value { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--text-primary); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .app-shell { flex-direction: column; padding: 1rem 1rem 3rem; gap: 1.25rem; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding-top: 0; }
    .sidebar-label { display: none; }
    .sidebar-item { font-size: 12px; padding: 7px 10px; }
    .stats-bar { display: none; }
    .page-title { font-size: 1.4rem; }
  }
  @media (max-width: 480px) {
    nav { padding: 0 1rem; }
    .badge { display: none; }
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text-primary);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(8px);
    transition: 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* typing cursor animation */
  .typing-cursor::after {
    content: '▋';
    animation: blink 0.8s step-end infinite;
    color: var(--accent);
    font-size: 0.9em;
    margin-left: 1px;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">
    <div class="logo-mark"></div>
    NeuroVault
  </a>
  <div class="nav-actions">
    <span class="badge">Gemini AI</span>
    <button class="btn-icon" id="theme-toggle" title="Toggle theme">
      <svg id="icon-moon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="icon-sun" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</nav>

<!-- SHELL -->
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <span class="sidebar-label">Menu</span>
    <a class="sidebar-item active" href="#">
      <span class="sidebar-icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </span> Query
    </a>
    <a class="sidebar-item" href="#" onclick="return false;">
      <span class="sidebar-icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </span> History
    </a>
    <a class="sidebar-item" href="#" onclick="return false;">
      <span class="sidebar-icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </span> Settings
    </a>

    <span class="sidebar-label" style="margin-top: 20px;">Stats</span>
    <div style="padding: 0 2px; display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; justify-content: space-between; font-size: 12px;">
        <span style="color: var(--text-muted);">Queries today</span>
        <span style="color: var(--text-primary); font-weight: 500;" id="stat-queries">0</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 12px;">
        <span style="color: var(--text-muted);">Avg response</span>
        <span style="color: var(--text-primary); font-weight: 500;" id="stat-avg">—</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Knowledge Retrieval</h1>
      <p class="page-sub">Provide context and ask anything — powered by Google Gemini</p>
    </div>

    <!-- INPUT PANEL -->
    <div class="panel" id="input-panel">
      <div class="panel-header">
        <span class="panel-title">
          <span class="dot"></span>
          Context
        </span>
        <span class="char-count" id="ctx-count">0 chars</span>
      </div>
      <textarea id="ctx-input" placeholder="Paste or type your context here — article, document, notes, data…"></textarea>

      <div class="question-row">
        <span class="q-prefix">Ask →</span>
        <input type="text" id="q-input" placeholder="What do you want to know about this context?" />
      </div>

      <div class="actions-row">
        <div class="actions-left">
          <button class="chip" onclick="loadExample()">Load example</button>
          <button class="chip" onclick="clearAll()">Clear</button>
        </div>
        <button class="btn-submit" id="submit-btn" onclick="submitQuery()">
          <div class="spinner" id="spinner"></div>
          <svg id="submit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
          <span id="submit-label">Ask AI</span>
        </button>
      </div>
    </div>

    <!-- RESPONSE PANEL -->
    <div class="panel response-panel" id="response-panel">
      <div class="response-header">
        <div class="ai-badge">
          <div class="ai-icon">✦</div>
          NeuroVault Answer
        </div>
        <span class="response-meta" id="response-meta"></span>
      </div>
      <div class="skeleton" id="skeleton">
        <div class="skel-line" style="width: 90%"></div>
        <div class="skel-line" style="width: 75%"></div>
        <div class="skel-line" style="width: 85%"></div>
        <div class="skel-line" style="width: 60%"></div>
      </div>
      <div class="error-box" id="error-box">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>
        <span id="error-msg">Something went wrong.</span>
      </div>
      <div class="response-body" id="response-body" style="display:none">
        <div class="response-text" id="response-text"></div>
      </div>
      <div class="response-actions" id="response-actions" style="display:none">
        <button class="btn-ghost" onclick="copyResponse()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="btn-ghost" onclick="askAnother()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-5.01"/></svg>
          Ask another
        </button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="history-section" id="history-section" style="display:none">
      <p class="history-title">Recent queries</p>
      <div class="history-list" id="history-list"></div>
    </div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const WEBHOOK = 'https://tanmaytyagi.app.n8n.cloud/webhook-test/a04f16d9-59b0-4b5e-8bfe-3a190de26e6e';

let queryCount = 0;
let totalMs = 0;
const history = [];

// Char counter
const ctxInput = document.getElementById('ctx-input');
const ctxCount = document.getElementById('ctx-count');
ctxInput.addEventListener('input', () => {
  ctxCount.textContent = ctxInput.value.length.toLocaleString() + ' chars';
});

// Enter to submit in question field
document.getElementById('q-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuery(); }
});

async function submitQuery() {
  const text = ctxInput.value.trim();
  const question = document.getElementById('q-input').value.trim();
  if (!text) { showToast('Please enter some context first.'); return; }
  if (!question) { showToast('Please enter a question.'); return; }

  setLoading(true);
  showResponsePanel('loading');
  const t0 = Date.now();

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, question })
    });

    const elapsed = Date.now() - t0;

    if (!res.ok) throw new Error(`Server error: ${res.status} ${res.statusText}`);

    let data;
    const raw = await res.text();
    try { data = JSON.parse(raw); } catch { data = { answer: raw }; }

    const answer = data.answer || data.output || data.text || data.response || data.result
      || (typeof data === 'string' ? data : JSON.stringify(data, null, 2));

    showResponsePanel('success', answer, elapsed);
    addHistory(question, answer);
    updateStats(elapsed);

  } catch (err) {
    showResponsePanel('error', err.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(loading) {
  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const icon = document.getElementById('submit-icon');
  const label = document.getElementById('submit-label');
  btn.disabled = loading;
  spinner.style.display = loading ? 'block' : 'none';
  icon.style.display = loading ? 'none' : 'block';
  label.textContent = loading ? 'Thinking…' : 'Ask AI';
}

function showResponsePanel(state, content, elapsed) {
  const panel = document.getElementById('response-panel');
  const skeleton = document.getElementById('skeleton');
  const errorBox = document.getElementById('error-box');
  const body = document.getElementById('response-body');
  const actions = document.getElementById('response-actions');
  const meta = document.getElementById('response-meta');

  panel.classList.add('visible');
  skeleton.classList.remove('active');
  errorBox.classList.remove('visible');
  body.style.display = 'none';
  actions.style.display = 'none';

  if (state === 'loading') {
    skeleton.classList.add('active');
  } else if (state === 'error') {
    document.getElementById('error-msg').textContent = content || 'An unexpected error occurred.';
    errorBox.classList.add('visible');
  } else if (state === 'success') {
    body.style.display = 'block';
    actions.style.display = 'flex';
    meta.textContent = elapsed ? `${(elapsed/1000).toFixed(2)}s` : '';
    typewriterEffect(document.getElementById('response-text'), content);
  }
}

function typewriterEffect(el, text) {
  el.textContent = '';
  el.classList.add('typing-cursor');
  const words = text.split(' ');
  let i = 0;
  const interval = setInterval(() => {
    if (i < words.length) {
      el.textContent += (i > 0 ? ' ' : '') + words[i];
      i++;
    } else {
      el.classList.remove('typing-cursor');
      clearInterval(interval);
    }
  }, 18);
}

function addHistory(question, answer) {
  history.unshift({ question, answer, time: new Date() });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (!history.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-q">${escHtml(h.question)}</div>
      <div class="history-time">${timeAgo(h.time)}</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const h = history[i];
  document.getElementById('q-input').value = h.question;
  showResponsePanel('success', h.answer);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateStats(elapsed) {
  queryCount++;
  totalMs += elapsed;
  document.getElementById('stat-queries').textContent = queryCount;
  document.getElementById('stat-avg').textContent = ((totalMs / queryCount) / 1000).toFixed(1) + 's';
}

function copyResponse() {
  const text = document.getElementById('response-text').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
}

function askAnother() {
  document.getElementById('q-input').value = '';
  document.getElementById('q-input').focus();
  document.getElementById('response-panel').classList.remove('visible');
}

function clearAll() {
  ctxInput.value = '';
  document.getElementById('q-input').value = '';
  ctxCount.textContent = '0 chars';
  document.getElementById('response-panel').classList.remove('visible');
}

function loadExample() {
  ctxInput.value = `The James Webb Space Telescope (JWST) is a space telescope designed to conduct infrared astronomy. As the largest optical telescope in space, its high resolution and sensitivity allow it to view objects too old, distant, or faint for the Hubble Space Telescope. JWST was launched on December 25, 2021, and entered orbit around the Sun–Earth L2 Lagrange point in January 2022. It is a collaborative project between NASA, the European Space Agency (ESA), and the Canadian Space Agency (CSA). The telescope is named after James E. Webb, who was administrator of NASA from 1961 to 1968 during the Mercury, Gemini, and Apollo programs.`;
  document.getElementById('q-input').value = 'When was the JWST launched and what is its main purpose?';
  ctxCount.textContent = ctxInput.value.length.toLocaleString() + ' chars';
  showToast('Example loaded — click Ask AI!');
}

// Theme toggle
const toggle = document.getElementById('theme-toggle');
toggle.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('icon-moon').style.display = isDark ? 'none' : 'block';
  document.getElementById('icon-sun').style.display = isDark ? 'block' : 'none';
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}
</script>
</body>
</html>
